steps:
  # 1. Build Docker image (includes frontend build)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'GIT_HASH=$SHORT_SHA'
      - '-t'
      - 'europe-north1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/simcash:$SHORT_SHA'
      - '-t'
      - 'europe-north1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/simcash:latest'
      - '.'

  # 2. Push image (tagged)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-north1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/simcash:$SHORT_SHA']

  # 3. Push image (latest)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-north1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/simcash:latest']

  # 4. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'simcash'
      - '--image'
      - 'europe-north1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/simcash:$SHORT_SHA'
      - '--region'
      - 'europe-north1'
      - '--platform'
      - 'managed'

  # 5. Extract built frontend from Docker image for Firebase Hosting
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker create --name extract europe-north1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/simcash:$SHORT_SHA
        docker cp extract:/app/web/frontend/dist/. /workspace/web/frontend/dist/
        docker rm extract

  # 6. Deploy frontend to Firebase Hosting
  - name: 'node:22-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g firebase-tools
        firebase deploy --only hosting \
          --project=$PROJECT_ID \
          --message="Build $SHORT_SHA"

timeout: '1200s'
images:
  - 'europe-north1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/simcash:$SHORT_SHA'
  - 'europe-north1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/simcash:latest'
